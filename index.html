<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloodbather - 04.10.2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --vhs-color-1: rgba(255, 0, 0, 0.8);
            --vhs-color-2: rgba(0, 0, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier Prime', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0.25;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain-animation 0.2s steps(4) infinite;
        }

        @keyframes grain-animation {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1%, 1%); }
            50% { transform: translate(1%, -1%); }
            75% { transform: translate(-1%, -1%); }
            100% { transform: translate(0, 0); }
        }

        /* Video Container */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: opacity 1.5s ease-in-out;
            background: #000;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.4) saturate(0.8) sepia(0.2);
            opacity: 0.8;
            transition: opacity 1.5s ease-in-out;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
            opacity: 0.6;
        }

        /* VHS chromatic aberration overlay */
        .overlay {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            pointer-events: none; /* enabled later */
            width: 100%;
        }

        .countdown-wrapper {
            position: relative;
            margin-bottom: 3rem;
            width: 100%;
            text-align: center;
        }

        .vhs-text {
            font-size: 5vw;
            font-weight: bold;
            text-shadow: 
                3px 0 2px var(--vhs-color-1), 
                -3px 0 2px var(--vhs-color-2);
            filter: blur(1px) contrast(150%);
            animation: text-flicker 0.12s infinite alternate, text-shift 5s infinite;
            letter-spacing: 0.15em;
            margin: 0;
            position: relative;
        }

        /* Double pseudo-elements for severe chromatic aberration */
        .vhs-text::before, .vhs-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        
        .vhs-text::before {
            left: 3px;
            text-shadow: -2px 0 red;
            background: transparent;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
            clip-path: inset(10% 0 80% 0);
            pointer-events: none;
        }
        
        .vhs-text::after {
            left: -3px;
            text-shadow: -2px 0 blue;
            background: transparent;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            clip-path: inset(80% 0 10% 0);
            pointer-events: none;
        }

        .timer-label {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: #bbb;
            text-shadow: 2px 0 1px var(--vhs-color-1), -2px 0 1px var(--vhs-color-2);
            animation: label-pulse 2s infinite;
            filter: blur(0.5px);
        }

        .social-icons {
            display: flex;
            gap: 3rem;
        }

        .social-icons a {
            color: #eee;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, filter 0.2s;
            filter: blur(1px) drop-shadow(2px 0 2px var(--vhs-color-1)) drop-shadow(-2px 0 2px var(--vhs-color-2));
            animation: floating 4s infinite ease-in-out;
        }

        .social-icons a:nth-child(2) { animation-delay: -1s; }
        .social-icons a:nth-child(3) { animation-delay: -2s; }

        .social-icons a:hover {
            transform: scale(1.15) translateY(-5px);
            filter: blur(0px) drop-shadow(4px 0 4px var(--vhs-color-1)) drop-shadow(-4px 0 4px var(--vhs-color-2));
        }

        .social-icons svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        @keyframes text-flicker {
            0% { opacity: 0.9; text-shadow: 2px 0 2px var(--vhs-color-1), -2px 0 2px var(--vhs-color-2); filter: blur(1px); }
            50% { opacity: 1; text-shadow: 4px 0 3px var(--vhs-color-1), -2px 0 4px var(--vhs-color-2); filter: blur(1.5px); }
            100% { opacity: 0.8; text-shadow: 1px 0 4px var(--vhs-color-1), -3px 0 2px var(--vhs-color-2); filter: blur(1px); transform: translateX(1px); }
        }

        @keyframes text-shift {
            0%, 98% { transform: scale(1); }
            99% { transform: scale(1) translateX(5px) skewX(5deg); }
            100% { transform: scale(1) translateX(-5px) skewX(-5deg); }
        }

        @keyframes label-pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; filter: brightness(1.2) blur(0px); }
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(2px, -1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(30% 0 10% 0); transform: translate(-2px, -1px); }
            60% { clip-path: inset(70% 0 20% 0); transform: translate(2px, 1px); }
            80% { clip-path: inset(5% 0 80% 0); transform: translate(2px, -2px); }
            100% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, 1px); }
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* Subtle CRT distortion border */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            z-index: 98;
            pointer-events: none;
        }

        @media screen and (max-width: 768px) {
            .vhs-text { font-size: 8vw; }
            .social-icons svg { width: 32px; height: 32px; }
            .social-icons { gap: 2rem; }
        }
        
    </style>
</head>
<body>

    <div class="grain"></div>
    <div class="scanlines"></div>

    <div class="video-container" id="vidContainer">
        <video id="heroVideo" autoplay muted playsinline disablePictureInPicture>
            <source src="webby.mov" type="video/quicktime">
            <source src="webby.mp4" type="video/mp4">
        </video>
    </div>

    <div class="overlay" id="contentOverlay">
        <div class="timer-label">Awaiting</div>
        <div class="countdown-wrapper">
            <h1 class="vhs-text" id="countdown" data-text="00:00:00:00">00:00:00:00</h1>
        </div>
        
        <div class="social-icons">
            <a href="https://www.facebook.com/bloodbather/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">

            <a href="https://x.com/bloodbather" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
                <svg viewBox="0 0 24 24"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
            </a>
        </div>
    </div>

    <script>
        const video = document.getElementById('heroVideo');
        const vidContainer = document.getElementById('vidContainer');
        const overlay = document.getElementById('contentOverlay');
        const countdownEl = document.getElementById('countdown');

        let isVideoComplete = false;

        const showCountdown = () => {
            if (isVideoComplete) return;
            isVideoComplete = true;
            
            // Fade out video softly
            video.style.opacity = '0';
            
            setTimeout(() => {
                vidContainer.style.opacity = '0';
                
                setTimeout(() => {
                    vidContainer.style.display = 'none';
                    overlay.style.pointerEvents = 'auto';
                    overlay.style.opacity = '1';
                }, 1000);
                
            }, 1000); 
        };

        video.addEventListener('ended', showCountdown);
        video.addEventListener('error', showCountdown);

        // Fallback max duration in case video events fail
        // Prompt says video is 4 seconds. Giving it 4.5s max before transition
        setTimeout(() => {
            if (!isVideoComplete) showCountdown();
        }, 4500);

        // Start video logic
        if (video.readyState >= 3) {
            video.play().catch(() => {});
        } else {
            video.addEventListener('canplay', () => {
                video.play().catch(() => {});
            });
        }

        // Countdown Logic (Target: April 10, 2026)
        const countDownDate = new Date("April 10, 2026 00:00:00").getTime();

        const updateTimer = () => {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance < 0) {
                countdownEl.innerHTML = "00:00:00:00";
                countdownEl.setAttribute('data-text', "00:00:00:00");
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const display = `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            countdownEl.innerHTML = display;
            // update data-text for glitch pseudo-elements
            countdownEl.setAttribute('data-text', display);
        };

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
