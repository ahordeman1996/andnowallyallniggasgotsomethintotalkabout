<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANAYNGSTTA - 04.10.2026</title>
    <link rel="icon" type="image/svg+xml" href="bb%20dog.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --vhs-color-1: rgba(255, 0, 0, 0.8);
            --vhs-color-2: rgba(0, 0, 255, 0.8);
            --brand-color: #cc2027;
        }

        ::-moz-selection {
            background-color: #cc2027;
            color: #fff;
        }

        ::selection {
            background-color: #cc2027;
            color: #fff;
        }

        * {
            -webkit-tap-highlight-color: rgba(204, 32, 39, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Courier Prime', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Digital grain overlay */
        .grain {
            position: fixed;
            top: -100%; left: -100%; width: 300%; height: 300%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.15;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain-animation 0.3s steps(1) infinite;
        }

        @keyframes grain-animation {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            20% { transform: translate(-15%, 5%); }
            30% { transform: translate(7%, -25%); }
            40% { transform: translate(-5%, 25%); }
            50% { transform: translate(-15%, 10%); }
            60% { transform: translate(15%, 0%); }
            70% { transform: translate(0%, 15%); }
            80% { transform: translate(3%, 35%); }
            90% { transform: translate(-10%, 10%); }
        }

        /* Video Container */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            z-index: 1;
            transition: opacity 1.5s ease-in-out;
            background: #000;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 aspect ratio */
            min-height: 100vh;
            min-height: 100dvh;
            min-width: 177.77vh; /* 16:9 aspect ratio */
            min-width: 177.77dvh;
            transform: translate(-50%, -50%);
            pointer-events: none;
            filter: contrast(1.4) saturate(0.8) sepia(0.2);
            opacity: 0.8;
            transition: opacity 1.5s ease-in-out;
        }

        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 99;
            opacity: 0.6;
        }

        /* VHS chromatic aberration overlay */
        .overlay {
            position: absolute;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
            width: 100%;
        }

        .countdown-wrapper {
            position: relative;
            margin-bottom: 3rem;
            width: 100%;
            text-align: center;
        }

        .vhs-text {
            font-size: 5vw;
            font-weight: bold;
            text-shadow: 
                3px 0 2px var(--vhs-color-1), 
                -3px 0 2px var(--vhs-color-2);
            filter: blur(1px) contrast(150%);
            animation: text-flicker 0.12s infinite alternate, text-shift 5s infinite;
            letter-spacing: 0.15em;
            margin: 0;
            position: relative;
        }

        /* Double pseudo-elements for severe chromatic aberration */
        .vhs-text::before, .vhs-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        
        .vhs-text::before {
            left: 3px;
            text-shadow: -2px 0 red;
            background: transparent;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
            clip-path: inset(10% 0 80% 0);
            pointer-events: none;
        }
        
        .vhs-text::after {
            left: -3px;
            text-shadow: -2px 0 blue;
            background: transparent;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
            clip-path: inset(80% 0 10% 0);
            pointer-events: none;
        }

        .social-icons {
            display: flex;
            gap: 3rem;
        }

        .social-icons a {
            color: #eee;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, filter 0.2s, color 0.2s;
            filter: blur(1px) drop-shadow(2px 0 2px var(--vhs-color-1)) drop-shadow(-2px 0 2px var(--vhs-color-2));
            animation: floating 4s infinite ease-in-out;
        }

        .social-icons a:nth-child(2) { animation-delay: -1s; }
        .social-icons a:nth-child(3) { animation-delay: -2s; }

        .social-icons a:hover {
            transform: scale(1.15) translateY(-5px);
            color: var(--brand-color);
            filter: blur(0px) drop-shadow(0 0 15px var(--brand-color)) drop-shadow(0 0 30px var(--vhs-color-1)) drop-shadow(0 0 45px var(--brand-color));
        }

        .social-icons svg {
            width: 40px;
            height: 40px;
            fill: currentColor;
        }

        @keyframes text-flicker {
            0% { opacity: 0.9; text-shadow: 2px 0 2px var(--vhs-color-1), -2px 0 2px var(--vhs-color-2); filter: blur(1px); }
            50% { opacity: 1; text-shadow: 4px 0 3px var(--vhs-color-1), -2px 0 4px var(--vhs-color-2); filter: blur(1.5px); }
            100% { opacity: 0.8; text-shadow: 1px 0 4px var(--vhs-color-1), -3px 0 2px var(--vhs-color-2); filter: blur(1px); transform: translateX(1px); }
        }

        @keyframes text-shift {
            0%, 98% { transform: scale(1); }
            99% { transform: scale(1) translateX(5px) skewX(5deg); }
            100% { transform: scale(1) translateX(-5px) skewX(-5deg); }
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(2px, -1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(30% 0 10% 0); transform: translate(-2px, -1px); }
            60% { clip-path: inset(70% 0 20% 0); transform: translate(2px, 1px); }
            80% { clip-path: inset(5% 0 80% 0); transform: translate(2px, -2px); }
            100% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, 1px); }
        }
        
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(5px); }
        }

        /* Subtle CRT distortion border */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            z-index: 98;
            pointer-events: none;
        }

        /* --- PORTAL STYLES --- */
        .portal-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            height: 100%;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1.5rem;
            box-sizing: border-box;
            opacity: 0;
            /* hide scrollbar */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .portal-container.active {
            display: flex;
            animation: fadeIn 1.5s ease-in-out forwards;
        }
        .portal-container::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { to { opacity: 1; } }

        .embed-wrapper {
            width: 100%; aspect-ratio: 16 / 9; margin-bottom: 3.5rem; position: relative;
            background: #000; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(204, 32, 39, 0.15), inset 0 0 15px rgba(204, 32, 39, 0.1);
            transition: all 0.3s ease; overflow: hidden;
        }
        .embed-wrapper:hover {
            box-shadow: 0 0 35px rgba(204, 32, 39, 0.4), inset 0 0 20px rgba(204, 32, 39, 0.2);
            border-color: rgba(204, 32, 39, 0.5);
        }
        .embed-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: auto; z-index: 2;
        }

        .links-wrapper {
            width: 100%; display: flex; flex-direction: column; gap: 1.25rem; padding-bottom: 5rem;
        }
        
        .portal-container.active .links-wrapper {
            animation: slideUpFade 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(20px);
            animation-delay: 0.5s;
        }

        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        .link-btn {
            position: relative; width: 100%; padding: 1.25rem; box-sizing: border-box; text-decoration: none; color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); background: rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; overflow: hidden; backdrop-filter: blur(5px); transition: border-color 0s, box-shadow 0s;
        }
        .link-btn::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--brand-color); opacity: 0; z-index: 1;
        }
        .link-btn:hover {
            border-color: var(--brand-color); box-shadow: 0 0 25px rgba(204, 32, 39, 0.6); z-index: 5; animation: btnTremor 0.15s ease-in-out forwards;
        }
        @keyframes btnTremor {
            0% { transform: scale(1) translate(0); }
            25% { transform: scale(1.01) translate(-2px, 1px); }
            50% { transform: scale(1.02) translate(1px, -2px); }
            75% { transform: scale(1.01) translate(-1px, 2px); }
            100% { transform: scale(1.02) translate(0); }
        }
        .link-btn:hover::before { opacity: 1; }
        .btn-text {
            position: relative; z-index: 2; font-size: 1.4rem; font-weight: bold; letter-spacing: 0.15em; text-shadow: 2px 0 2px var(--vhs-color-1), -2px 0 2px var(--vhs-color-2); transition: filter 0.2s ease, letter-spacing 0.2s ease; filter: blur(0.5px);
        }
        .link-btn:hover .btn-text {
            color: #000; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); filter: blur(0px); letter-spacing: 0.25em;
        }

        .portal-container .vhs-text {
            font-size: 4rem;
            margin-bottom: 2.5rem;
            line-height: 1;
        }

        @media screen and (max-width: 768px) {
            .vhs-text { font-size: 8vw; }
            .social-icons svg { width: 32px; height: 32px; }
            .social-icons { gap: 2rem; }
            
            .portal-container .vhs-text { font-size: 2.8rem; margin-bottom: 2rem; }
            .portal-container { padding: 3rem 1rem; }
            .btn-text { font-size: 1.1rem; }
            .link-btn:hover .btn-text { letter-spacing: 0.2em; }
        }
        
    </style>
</head>
<body>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        const iframe = document.getElementById('heroVideo');
        const vidContainer = document.getElementById('vidContainer');
        const overlay = document.getElementById('contentOverlay');
        const countdownEl = document.getElementById('countdown');
        const countDownDate = new Date("April 9, 2026 21:00:00 EST").getTime();

        let isVideoComplete = false;
        let portalActivated = false;

        const activatePortal = () => {
            if (portalActivated) return;
            portalActivated = true;
            
            overlay.style.transition = 'opacity 1s ease-in-out';
            overlay.style.opacity = '0';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                const portal = document.getElementById('portalContainer');
                portal.classList.add('active');
            }, 1000);
        };

        const showCountdown = () => {
            if (isVideoComplete) return;
            isVideoComplete = true;
            
            iframe.style.opacity = '0';
            
            setTimeout(() => {
                vidContainer.style.opacity = '0';
                
                setTimeout(() => {
                    vidContainer.style.display = 'none';
                    const now = new Date().getTime();
                    
                    if (countDownDate - now < 0) {
                        portalActivated = true;
                        document.getElementById('portalContainer').classList.add('active');
                        overlay.style.display = 'none';
                    } else {
                        overlay.style.pointerEvents = 'auto';
                        overlay.style.opacity = '1';
                    }
                }, 1000);
                
            }, 1000); 
        };

        const player = new Vimeo.Player(iframe);
        player.on('ended', showCountdown);
        player.on('error', showCountdown);
        player.on('timeupdate', function(data) {
            // Using timeupdate as a fallback since background=1 might loop and never fire ended
            if (data.percent > 0.95 || data.seconds > 4.0) {
                 showCountdown();
            }
        });

        // Backup timeouts and force-play
        player.ready().then(() => {
            player.play().catch(e => console.warn("Autoplay strict block:", e));
        });

        let playStarted = false;
        player.on('play', () => {
            playStarted = true;
            setTimeout(() => {
                if (!isVideoComplete) showCountdown();
            }, 5500); 
        });

        setTimeout(() => {
            if (!playStarted && !isVideoComplete) showCountdown();
        }, 12000);

        const updateTimer = () => {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            if (distance < 0) {
                countdownEl.innerHTML = "00:00:00:00";
                countdownEl.setAttribute('data-text', "00:00:00:00");
                
                if (isVideoComplete && !portalActivated) {
                    activatePortal();
                }
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const display = `${String(days).padStart(2, '0')}:${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            countdownEl.innerHTML = display;
            countdownEl.setAttribute('data-text', display);
        };

        updateTimer();
        setInterval(updateTimer, 1000);
    </script>
